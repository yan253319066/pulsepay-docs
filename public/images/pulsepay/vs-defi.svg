<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <!-- Background -->
  <rect width="700" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">DeFi vs PulsePay 收益对比</text>
  <text x="350" y="50" text-anchor="middle" fill="#64748b" font-size="12">Traditional DeFi vs PulsePay Revenue</text>
  
  <!-- Traditional DeFi Box -->
  <rect x="30" y="70" width="300" height="200" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="180" y="95" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold">❌ 传统 DeFi 挖矿</text>
  <text x="180" y="115" text-anchor="middle" fill="#ef4444" font-size="12">Traditional DeFi Mining</text>
  
  <!-- Flow -->
  <rect x="50" y="130" width="260" height="30" rx="4" fill="#fee2e2"/>
  <text x="180" y="150" text-anchor="middle" fill="#991b1b" font-size="11">用户A 存入 $1000</text>
  
  <path d="M180 165 L180 185" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="50" y="190" width="260" height="30" rx="4" fill="#fee2e2"/>
  <text x="180" y="210" text-anchor="middle" fill="#991b1b" font-size="11">新用户B 存入 $500（收益来源）</text>
  
  <path d="M180 225 L180 245" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="50" y="250" width="260" height="30" rx="4" fill="#fee2e2"/>
  <text x="180" y="270" text-anchor="middle" fill="#991b1b" font-size="11">庞氏结构：新钱补旧钱</text>
  
  <!-- Warning -->
  <rect x="30" y="285" width="300" height="35" rx="8" fill="#fef3c7"/>
  <text x="180" y="307" text-anchor="middle" fill="#92400e" font-size="11">⚠️ 一旦新用户停止 → 收益归零</text>
  
  <!-- PulsePay Box -->
  <rect x="370" y="70" width="300" height="200" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="520" y="95" text-anchor="middle" fill="#16a34a" font-size="16" font-weight="bold">✅ PulsePay 收益分成</text>
  <text x="520" y="115" text-anchor="middle" fill="#22c55e" font-size="12">PulsePay Revenue Share</text>
  
  <!-- Flow -->
  <rect x="390" y="130" width="260" height="30" rx="4" fill="#dcfce7"/>
  <text x="520" y="150" text-anchor="middle" fill="#166534" font-size="11">用户使用 AI Gateway</text>
  
  <path d="M520 165 L520 185" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="390" y="190" width="260" height="30" rx="4" fill="#dcfce7"/>
  <text x="520" y="210" text-anchor="middle" fill="#166534" font-size="11">平台获得 AI 调用费（真实收入）</text>
  
  <path d="M520 225 L520 245" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="390" y="250" width="260" height="30" rx="4" fill="#dcfce7"/>
  <text x="520" y="270" text-anchor="middle" fill="#166534" font-size="11">40% 分给 AIP 质押者</text>
  
  <!-- Success -->
  <rect x="370" y="285" width="300" height="35" rx="8" fill="#d1fae5"/>
  <text x="520" y="307" text-anchor="middle" fill="#065f46" font-size="11">✅ 真实业务支撑，持续收益</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="340" width="640" height="140" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="80" y="370" fill="#64748b" font-size="11">收益来源</text>
  <text x="250" y="370" fill="#ef4444" font-size="11">❌ 新用户资金</text>
  <text x="480" y="370" fill="#22c55e" font-size="11">✅ AI 业务收入</text>
  
  <text x="80" y="400" fill="#64748b" font-size="11">透明度</text>
  <text x="250" y="400" fill="#ef4444" font-size="11">❌ 链下不透明</text>
  <text x="480" y="400" fill="#22c55e" font-size="11">✅ 链上可查</text>
  
  <text x="80" y="430" fill="#64748b" font-size="11">可持续性</text>
  <text x="250" y="430" fill="#ef4444" font-size="11">❌ 依赖新资金</text>
  <text x="480" y="430" fill="#22c55e" font-size="11">✅ 依赖业务增长</text>
  
  <text x="80" y="460" fill="#64748b" font-size="11">风险</text>
  <text x="250" y="460" fill="#ef4444" font-size="11">❌ 庞氏风险高</text>
  <text x="480" y="460" fill="#22c55e" font-size="11">✅ 业务风险</text>
</svg>
