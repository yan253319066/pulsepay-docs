<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">质押收益计算示例</text>
  <text x="350" y="50" text-anchor="middle" fill="#64748b" font-size="12">Revenue Share Calculation Example</text>
  
  <!-- Input Section -->
  <rect x="30" y="70" width="640" height="120" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="95" fill="#1e293b" font-size="14" font-weight="bold">📊 假设条件 / Assumptions</text>
  
  <rect x="50" y="110" width="200" height="30" rx="4" fill="#dbeafe"/>
  <text x="60" y="130" fill="#1e40af" font-size="11">平台每日收入：10,000 USDT</text>
  
  <rect x="260" y="110" width="200" height="30" rx="4" fill="#dcfce7"/>
  <text x="270" y="130" fill="#166534" font-size="11">收益分成比例：40%</text>
  
  <rect x="470" y="110" width="180" height="30" rx="4" fill="#fef3c7"/>
  <text x="480" y="130" fill="#92400e" font-size="11">你的质押量：10,000 AIP</text>
  
  <rect x="50" y="150" width="200" height="30" rx="4" fill="#fce7f3"/>
  <text x="60" y="170" fill="#9d174d" font-size="11">全网质押总量：1,000,000 AIP</text>
  
  <!-- Calculation Flow -->
  <text x="50" y="220" fill="#1e293b" font-size="14" font-weight="bold">📝 计算步骤 / Calculation Steps</text>
  
  <!-- Step 1 -->
  <rect x="50" y="235" width="300" height="50" rx="8" fill="#3b82f6"/>
  <text x="70" y="255" fill="#ffffff" font-size="11" font-weight="bold">步骤 1：计算可分配收益</text>
  <text x="70" y="275" fill="#dbeafe" font-size="10">10,000 × 40% = 4,000 USDT</text>
  
  <!-- Arrow -->
  <path d="M355 260 L385 260" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2 -->
  <rect x="390" y="235" width="280" height="50" rx="8" fill="#8b5cf6"/>
  <text x="410" y="255" fill="#ffffff" font-size="11" font-weight="bold">步骤 2：计算你的份额</text>
  <text x="410" y="275" fill="#ede9fe" font-size="10">10,000 ÷ 1,000,000 = 1%</text>
  
  <!-- Arrow -->
  <path d="M530 290 L530 320" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 3 -->
  <rect x="230" y="325" width="280" height="50" rx="8" fill="#10b981"/>
  <text x="250" y="345" fill="#ffffff" font-size="11" font-weight="bold">步骤 3：计算你的收益</text>
  <text x="250" y="365" fill="#d1fae5" font-size="10">4,000 × 1% = 40 USDT/日</text>
  
  <!-- Result Box -->
  <rect x="30" y="390" width="640" height="90" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="420" text-anchor="middle" fill="#92400e" font-size="16" font-weight="bold">💰 结果 / Result</text>
  
  <text x="150" y="450" text-anchor="middle" fill="#78350f" font-size="12">每日收益 / Daily Revenue</text>
  <text x="150" y="470" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">40 USDT</text>
  
  <text x="350" y="450" text-anchor="middle" fill="#78350f" font-size="12">每月收益 / Monthly Revenue</text>
  <text x="350" y="470" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">1,200 USDT</text>
  
  <text x="550" y="450" text-anchor="middle" fill="#78350f" font-size="12">年化收益 / Annual Revenue</text>
  <text x="550" y="470" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">14,600 USDT (146%)</text>
</svg>
