<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <!-- Background -->
  <rect width="700" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">钱包安全指南</text>
  <text x="350" y="50" text-anchor="middle" fill="#64748b" font-size="12">Wallet Security Guide</text>
  
  <!-- DO Column -->
  <rect x="30" y="70" width="300" height="360" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="180" y="95" text-anchor="middle" fill="#16a34a" font-size="18" font-weight="bold">✅ 正确做法</text>
  <text x="180" y="115" text-anchor="middle" fill="#22c55e" font-size="12">Do This</text>
  
  <!-- Items -->
  <circle cx="60" cy="150" r="15" fill="#22c55e"/>
  <text x="60" y="155" text-anchor="middle" fill="#ffffff" font-size="14">✓</text>
  <text x="85" y="145" fill="#166534" font-size="12" font-weight="bold">手写助记词</text>
  <text x="85" y="165" fill="#64748b" font-size="10">Write seed phrase on paper</text>
  
  <circle cx="60" cy="200" r="15" fill="#22c55e"/>
  <text x="60" y="205" text-anchor="middle" fill="#ffffff" font-size="14">✓</text>
  <text x="85" y="195" fill="#166534" font-size="12" font-weight="bold">多份备份</text>
  <text x="85" y="215" fill="#64748b" font-size="10">Multiple copies in safe places</text>
  
  <circle cx="60" cy="250" r="15" fill="#22c55e"/>
  <text x="60" y="255" text-anchor="middle" fill="#ffffff" font-size="14">✓</text>
  <text x="85" y="245" fill="#166534" font-size="12" font-weight="bold">验证合约地址</text>
  <text x="85" y="265" fill="#64748b" font-size="10">Verify contract address on explorer</text>
  
  <circle cx="60" cy="300" r="15" fill="#22c55e"/>
  <text x="60" y="305" text-anchor="middle" fill="#ffffff" font-size="14">✓</text>
  <text x="85" y="295" fill="#166534" font-size="12" font-weight="bold">小额测试</text>
  <text x="85" y="315" fill="#64748b" font-size="10">Test with small amount first</text>
  
  <circle cx="60" cy="350" r="15" fill="#22c55e"/>
  <text x="60" y="355" text-anchor="middle" fill="#ffffff" font-size="14">✓</text>
  <text x="85" y="345" fill="#166534" font-size="12" font-weight="bold">硬件钱包</text>
  <text x="85" y="365" fill="#64748b" font-size="10">Use hardware wallet for large amounts</text>
  
  <circle cx="60" cy="400" r="15" fill="#22c55e"/>
  <text x="60" y="405" text-anchor="middle" fill="#ffffff" font-size="14">✓</text>
  <text x="85" y="395" fill="#166534" font-size="12" font-weight="bold">官方渠道</text>
  <text x="85" y="415" fill="#64748b" font-size="10">Only use official links</text>
  
  <!-- DON'T Column -->
  <rect x="370" y="70" width="300" height="360" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="520" y="95" text-anchor="middle" fill="#dc2626" font-size="18" font-weight="bold">❌ 千万不要</text>
  <text x="520" y="115" text-anchor="middle" fill="#ef4444" font-size="12">Never Do This</text>
  
  <!-- Items -->
  <circle cx="400" cy="150" r="15" fill="#ef4444"/>
  <text x="400" y="155" text-anchor="middle" fill="#ffffff" font-size="14">✗</text>
  <text x="425" y="145" fill="#991b1b" font-size="12" font-weight="bold">截图保存助记词</text>
  <text x="425" y="165" fill="#64748b" font-size="10">Screenshot = Hack risk</text>
  
  <circle cx="400" cy="200" r="15" fill="#ef4444"/>
  <text x="400" y="205" text-anchor="middle" fill="#ffffff" font-size="14">✗</text>
  <text x="425" y="195" fill="#991b1b" font-size="12" font-weight="bold">告诉他人私钥</text>
  <text x="425" y="215" fill="#64748b" font-size="10">Never share private key</text>
  
  <circle cx="400" cy="250" r="15" fill="#ef4444"/>
  <text x="400" y="255" text-anchor="middle" fill="#ffffff" font-size="14">✗</text>
  <text x="425" y="245" fill="#991b1b" font-size="12" font-weight="bold">点击钓鱼链接</text>
  <text x="425" y="265" fill="#64748b" font-size="10">Don't click phishing links</text>
  
  <circle cx="400" cy="300" r="15" fill="#ef4444"/>
  <text x="400" y="305" text-anchor="middle" fill="#ffffff" font-size="14">✗</text>
  <text x="425" y="295" fill="#991b1b" font-size="12" font-weight="bold">云盘存储</text>
  <text x="425" y="315" fill="#64748b" font-size="10">Cloud storage = Leak risk</text>
  
  <circle cx="400" cy="350" r="15" fill="#ef4444"/>
  <text x="400" y="355" text-anchor="middle" fill="#ffffff" font-size="14">✗</text>
  <text x="425" y="345" fill="#991b1b" font-size="12" font-weight="bold">信任"客服"</text>
  <text x="425" y="365" fill="#64748b" font-size="10">Official never asks for private key</text>
  
  <circle cx="400" cy="400" r="15" fill="#ef4444"/>
  <text x="400" y="405" text-anchor="middle" fill="#ffffff" font-size="14">✗</text>
  <text x="425" y="395" fill="#991b1b" font-size="12" font-weight="bold">贪高收益</text>
  <text x="425" y="415" fill="#64748b" font-size="10">High return = Likely scam</text>
</svg>
