<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667eea"/>
    </marker>
  </defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="bold">PulsePay 工作原理</text>
  <text x="350" y="55" text-anchor="middle" fill="#64748b" font-size="12">How PulsePay Works</text>
  
  <!-- User Layer -->
  <rect x="100" y="80" width="500" height="60" rx="8" fill="url(#bg)"/>
  <text x="350" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">用户层 - Digital Wallet</text>
  <text x="350" y="128" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.8">app.pulsepay.fun</text>
  
  <!-- Arrow Down -->
  <path d="M350 145 L350 175" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- AI Gateway Layer -->
  <rect x="100" y="180" width="500" height="80" rx="8" fill="#3b82f6"/>
  <text x="350" y="210" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">AI Gateway 层</text>
  <text x="350" y="230" text-anchor="middle" fill="#ffffff" font-size="12">ai.pulsepay.fun</text>
  <text x="350" y="248" text-anchor="middle" fill="#ffffff" font-size="10" opacity="0.8">OpenAI · Anthropic · Google · 本地模型</text>
  
  <!-- Arrow Down -->
  <path d="M350 265 L350 295" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Payment Layer -->
  <rect x="100" y="300" width="500" height="80" rx="8" fill="#10b981"/>
  <text x="350" y="330" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">支付层 - Payment System</text>
  <text x="350" y="350" text-anchor="middle" fill="#ffffff" font-size="12">pulsepay.fun</text>
  <text x="350" y="368" text-anchor="middle" fill="#ffffff" font-size="10" opacity="0.8">USDT · BNB · 充值 · 消费 · 提现</text>
  
  <!-- Arrow Down -->
  <path d="M350 385 L350 415" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Protocol Layer -->
  <rect x="100" y="420" width="500" height="70" rx="8" fill="#f59e0b"/>
  <text x="350" y="450" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">协议层 - Protocol</text>
  <text x="350" y="470" text-anchor="middle" fill="#ffffff" font-size="10">AIP Token + 收益分成合约 · 链上透明可查</text>
  
  <!-- Revenue Distribution -->
  <rect x="480" y="320" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="345" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">收入分配</text>
  <text x="520" y="365" fill="#92400e" font-size="10">40% → 收益分成</text>
  <text x="520" y="385" fill="#92400e" font-size="10">30% → 回购销毁</text>
  <text x="520" y="405" fill="#92400e" font-size="10">20% → 团队运营</text>
  <text x="520" y="425" fill="#92400e" font-size="10">10% → 生态激励</text>
</svg>
