<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <!-- Background -->
  <rect width="700" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">Token 分配图解</text>
  <text x="350" y="50" text-anchor="middle" fill="#64748b" font-size="12">Token Allocation</text>
  
  <!-- Pie Chart -->
  <circle cx="200" cy="250" r="120" fill="#f8fafc"/>
  
  <!-- Segments (using path arcs) -->
  <!-- Public Sale 50% -->
  <path d="M200,250 L200,130 A120,120 0 0,1 320,250 Z" fill="#3b82f6"/>
  <text x="260" y="180" fill="#ffffff" font-size="14" font-weight="bold">50%</text>
  <text x="260" y="200" fill="#dbeafe" font-size="10">公开发售</text>
  
  <!-- Team 15% -->
  <path d="M200,250 L320,250 A120,120 0 0,1 200,370 Z" fill="#8b5cf6"/>
  <text x="280" y="310" fill="#ffffff" font-size="12" font-weight="bold">15%</text>
  <text x="280" y="325" fill="#ede9fe" font-size="9">团队</text>
  
  <!-- Liquidity 15% -->
  <path d="M200,250 L200,370 A120,120 0 0,1 80,250 Z" fill="#10b981"/>
  <text x="120" y="310" fill="#ffffff" font-size="12" font-weight="bold">15%</text>
  <text x="120" y="325" fill="#d1fae5" font-size="9">流动性</text>
  
  <!-- Ecosystem 10% -->
  <path d="M200,250 L80,250 A120,120 0 0,1 120,150 Z" fill="#f59e0b"/>
  <text x="100" y="180" fill="#ffffff" font-size="10" font-weight="bold">10%</text>
  <text x="100" y="195" fill="#fef3c7" font-size="8">生态激励</text>
  
  <!-- Initial Burn 10% -->
  <path d="M200,250 L120,150 A120,120 0 0,1 200,130 Z" fill="#ef4444"/>
  <text x="150" y="170" fill="#ffffff" font-size="10" font-weight="bold">10%</text>
  <text x="150" y="185" fill="#fee2e2" font-size="8">初始销毁</text>
  
  <!-- Details Table -->
  <rect x="380" y="70" width="290" height="340" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="400" y="95" fill="#1e293b" font-size="14" font-weight="bold">详细分配 / Details</text>
  
  <!-- Header -->
  <rect x="390" y="105" width="270" height="25" rx="4" fill="#f1f5f9"/>
  <text x="410" y="122" fill="#64748b" font-size="10">分配项</text>
  <text x="500" y="122" fill="#64748b" font-size="10">比例</text>
  <text x="560" y="122" fill="#64748b" font-size="10">数量</text>
  <text x="640" y="122" fill="#64748b" font-size="10">规则</text>
  
  <!-- Row 1 -->
  <text x="410" y="150" fill="#1e293b" font-size="11">公开发售</text>
  <text x="510" y="150" fill="#3b82f6" font-size="11">50%</text>
  <text x="570" y="150" fill="#64748b" font-size="10">50M</text>
  <text x="640" y="150" fill="#64748b" font-size="9">Phase 1</text>
  
  <!-- Row 2 -->
  <text x="410" y="185" fill="#1e293b" font-size="11">团队</text>
  <text x="510" y="185" fill="#8b5cf6" font-size="11">15%</text>
  <text x="570" y="185" fill="#64748b" font-size="10">15M</text>
  <text x="640" y="185" fill="#64748b" font-size="9">锁1年</text>
  
  <!-- Row 3 -->
  <text x="410" y="220" fill="#1e293b" font-size="11">流动性</text>
  <text x="510" y="220" fill="#10b981" font-size="11">15%</text>
  <text x="570" y="220" fill="#64748b" font-size="10">15M</text>
  <text x="640" y="220" fill="#64748b" font-size="9">DEX</text>
  
  <!-- Row 4 -->
  <text x="410" y="255" fill="#1e293b" font-size="11">生态激励</text>
  <text x="510" y="255" fill="#f59e0b" font-size="11">10%</text>
  <text x="570" y="255" fill="#64748b" font-size="10">10M</text>
  <text x="640" y="255" fill="#64748b" font-size="9">社区</text>
  
  <!-- Row 5 -->
  <text x="410" y="290" fill="#1e293b" font-size="11">初始销毁</text>
  <text x="510" y="290" fill="#ef4444" font-size="11">10%</text>
  <text x="570" y="290" fill="#64748b" font-size="10">10M</text>
  <text x="640" y="290" fill="#64748b" font-size="9">黑洞地址</text>
  
  <!-- Total -->
  <line x1="390" y1="310" x2="660" y2="310" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="335" fill="#1e293b" font-size="12" font-weight="bold">总计</text>
  <text x="510" y="335" fill="#1e293b" font-size="12" font-weight="bold">100%</text>
  <text x="570" y="335" fill="#64748b" font-size="11">100M</text>
  <text x="640" y="335" fill="#64748b" font-size="10">—</text>
  
  <!-- Note -->
  <rect x="390" y="355" width="270" height="45" rx="8" fill="#fef3c7"/>
  <text x="410" y="375" fill="#92400e" font-size="10">💡 初始流通 = 公募(50M) + 流动性(15M)</text>
  <text x="410" y="392" fill="#b45309" font-size="10">= 65,000,000 AIP</text>
</svg>
