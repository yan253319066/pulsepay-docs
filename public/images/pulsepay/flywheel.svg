<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <!-- Background -->
  <rect width="700" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">经济飞轮</text>
  <text x="350" y="50" text-anchor="middle" fill="#64748b" font-size="12">Economic Flywheel</text>
  
  <!-- Center Circle -->
  <circle cx="350" cy="230" r="60" fill="#667eea"/>
  <text x="350" y="220" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">AIP</text>
  <text x="350" y="240" text-anchor="middle" fill="#ffffff" font-size="12">Token</text>
  <text x="350" y="260" text-anchor="middle" fill="#ffffff" font-size="10">价值提升</text>
  
  <!-- Outer Ring - Steps -->
  
  <!-- Step 1: Top -->
  <rect x="250" y="60" width="200" height="50" rx="8" fill="#3b82f6"/>
  <text x="350" y="85" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">更多用户使用 AI Gateway</text>
  <path d="M350 115 L350 135" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Top Right -->
  <rect x="480" y="140" width="180" height="50" rx="8" fill="#10b981"/>
  <text x="570" y="165" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">更多收入</text>
  <path d="M540 170 L500 180" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Right -->
  <rect x="480" y="210" width="180" height="50" rx="8" fill="#f59e0b"/>
  <text x="570" y="235" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">收益分成 + 回购销毁</text>
  <path d="M540 220 L500 210" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Bottom Right -->
  <rect x="480" y="280" width="180" height="50" rx="8" fill="#ef4444"/>
  <text x="570" y="305" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">吸引更多用户购买 AIP</text>
  <path d="M540 290 L500 270" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 5: Bottom -->
  <rect x="250" y="340" width="200" height="50" rx="8" fill="#8b5cf6"/>
  <text x="350" y="365" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">更多资金进入平台</text>
  <path d="M350 320 L350 300" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 6: Bottom Left -->
  <rect x="40" y="280" width="180" height="50" rx="8" fill="#ec4899"/>
  <text x="130" y="305" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">平台优化产品</text>
  <path d="M200 290 L240 270" stroke="#ec4899" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 7: Left -->
  <rect x="40" y="210" width="180" height="50" rx="8" fill="#06b6d4"/>
  <text x="130" y="235" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">更多资源投入</text>
  <path d="M200 220 L240 210" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 8: Top Left -->
  <rect x="40" y="140" width="180" height="50" rx="8" fill="#84cc16"/>
  <text x="130" y="165" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">更多用户使用</text>
  <path d="M200 170 L240 180" stroke="#84cc16" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Loop indicator -->
  <path d="M280 75 Q 200 75 200 230 Q 200 385 350 385 Q 500 385 500 230 Q 500 75 420 75" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  <text x="350" y="435" text-anchor="middle" fill="#94a3b8" font-size="11">循环加速 ♻️</text>
</svg>
