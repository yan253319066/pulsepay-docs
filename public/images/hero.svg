<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>
  
  <!-- AI Brain -->
  <circle cx="250" cy="200" r="80" fill="#ffffff" opacity="0.2"/>
  <circle cx="250" cy="200" r="60" fill="#ffffff" opacity="0.3"/>
  <text x="250" y="195" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold">AI</text>
  <text x="250" y="220" text-anchor="middle" fill="#ffffff" font-size="14">Brain</text>
  
  <!-- Arrows -->
  <path d="M340 180 L460 180" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M340 220 L460 220" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Blockchain -->
  <rect x="480" y="140" width="120" height="120" rx="12" fill="#ffffff" opacity="0.2"/>
  <rect x="490" y="150" width="100" height="100" rx="8" fill="#ffffff" opacity="0.3"/>
  <text x="540" y="195" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Blockchain</text>
  <text x="540" y="215" text-anchor="middle" fill="#ffffff" font-size="12">Trustless</text>
  
  <!-- Token -->
  <circle cx="540" cy="320" r="50" fill="#ffd700" opacity="0.9"/>
  <text x="540" y="315" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">AIP</text>
  <text x="540" y="335" text-anchor="middle" fill="#333" font-size="10">Token</text>
  
  <!-- Revenue Share -->
  <rect x="200" y="320" width="120" height="50" rx="8" fill="#4ade80" opacity="0.9"/>
  <text x="260" y="350" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Revenue Share</text>
  
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold">PulsePay Protocol</text>
  <text x="400" y="90" text-anchor="middle" fill="#ffffff" font-size="16" opacity="0.8">AI Usage = Mining</text>
</svg>
