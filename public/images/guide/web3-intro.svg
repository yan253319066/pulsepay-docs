<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4776e6"/>
      <stop offset="100%" style="stop-color:#8e54e9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">What is Web3?</text>
  
  <!-- Web1 Box -->
  <rect x="50" y="70" width="150" height="100" rx="8" fill="url(#grad1)"/>
  <text x="125" y="100" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Web1</text>
  <text x="125" y="125" text-anchor="middle" fill="#ffffff" font-size="12">只读</text>
  <text x="125" y="145" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.8">Read Only</text>
  
  <!-- Arrow 1 -->
  <path d="M210 120 L240 120" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Web2 Box -->
  <rect x="250" y="70" width="150" height="100" rx="8" fill="url(#grad2)"/>
  <text x="325" y="100" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Web2</text>
  <text x="325" y="125" text-anchor="middle" fill="#ffffff" font-size="12">读写</text>
  <text x="325" y="145" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.8">Read &amp; Write</text>
  
  <!-- Arrow 2 -->
  <path d="M410 120 L440 120" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Web3 Box -->
  <rect x="450" y="70" width="100" height="100" rx="8" fill="#10b981"/>
  <text x="500" y="100" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Web3</text>
  <text x="500" y="125" text-anchor="middle" fill="#ffffff" font-size="12">去中心化</text>
  <text x="500" y="145" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.8">Decentralized</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="200" width="500" height="180" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="80" y="230" fill="#64748b" font-size="12">数据存储</text>
  <text x="80" y="270" fill="#64748b" font-size="12">身份验证</text>
  <text x="80" y="310" fill="#64748b" font-size="12">支付方式</text>
  <text x="80" y="350" fill="#64748b" font-size="12">数据所有权</text>
  
  <text x="280" y="230" fill="#1e293b" font-size="12">公司服务器</text>
  <text x="280" y="270" fill="#1e293b" font-size="12">用户名+密码</text>
  <text x="280" y="310" fill="#1e293b" font-size="12">银行卡</text>
  <text x="280" y="350" fill="#1e293b" font-size="12">平台拥有</text>
  
  <text x="400" y="230" fill="#10b981" font-size="12">区块链</text>
  <text x="400" y="270" fill="#10b981" font-size="12">钱包地址</text>
  <text x="400" y="310" fill="#10b981" font-size="12">加密货币</text>
  <text x="400" y="350" fill="#10b981" font-size="12">用户拥有</text>
  
  <!-- Divider -->
  <line x1="220" y1="200" x2="220" y2="380" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="370" y1="200" x2="370" y2="380" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="150" y="220" text-anchor="middle" fill="#64748b" font-size="11">传统</text>
  <text x="300" y="220" text-anchor="middle" fill="#64748b" font-size="11">vs</text>
  <text x="450" y="220" text-anchor="middle" fill="#10b981" font-size="11">Web3</text>
</svg>
